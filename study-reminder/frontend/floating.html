<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyReminder - 悬浮窗</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      /* 悬浮图标 - 默认状态 40x40 */
      .float-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #f97316, #ea580c);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        position: relative;
      }

      .float-icon:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 16px rgba(249, 115, 22, 0.4);
      }

      .float-icon .icon-text {
        color: white;
        font-size: 18px;
        font-weight: bold;
      }

      /* 展开面板 - 鼠标悬停时显示 */
      .float-panel {
        position: fixed;
        right: 48px;
        top: 0;
        width: 280px;
        max-height: 400px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        padding: 12px;
        display: none;
        overflow-y: auto;
      }

      .float-icon:hover + .float-panel,
      .float-panel:hover {
        display: block;
      }

      .float-panel h3 {
        font-size: 13px;
        color: #78716c;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid #e7e5e4;
      }

      .float-panel .task-item {
        padding: 6px 8px;
        border-radius: 6px;
        margin-bottom: 4px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .float-panel .task-item:hover {
        background: #f5f5f4;
      }

      .float-panel .task-item .task-title {
        font-weight: 500;
        color: #44403c;
      }

      .float-panel .task-item .task-time {
        color: #a8a29e;
        font-size: 11px;
      }

      .float-panel .task-item.priority-high {
        border-left: 3px solid #ef4444;
      }
      .float-panel .task-item.priority-medium {
        border-left: 3px solid #eab308;
      }
      .float-panel .task-item.priority-low {
        border-left: 3px solid #d6d3d1;
      }

      .float-panel .empty-state {
        text-align: center;
        color: #a8a29e;
        font-size: 12px;
        padding: 20px 0;
      }

      .float-panel .open-btn {
        display: block;
        width: 100%;
        padding: 6px;
        margin-top: 8px;
        background: #f97316;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .float-panel .open-btn:hover {
        background: #ea580c;
      }
    </style>
  </head>
  <body>
    <div class="float-icon" id="floatIcon">
      <span class="icon-text">📋</span>
    </div>

    <div class="float-panel" id="floatPanel">
      <h3>📌 今日任务</h3>
      <div id="taskList">
        <div class="empty-state">加载中...</div>
      </div>
      <button class="open-btn" id="openMainBtn">打开主窗口</button>
    </div>

    <script type="module">
      import { invoke } from "@tauri-apps/api/core";
      import { getCurrentWindow } from "@tauri-apps/api/window";

      const floatIcon = document.getElementById("floatIcon");
      const floatPanel = document.getElementById("floatPanel");
      const taskList = document.getElementById("taskList");
      const openMainBtn = document.getElementById("openMainBtn");

      // 点击图标打开主窗口
      floatIcon.addEventListener("click", () => {
        invoke("toggle_main_window");
      });

      // 点击"打开主窗口"按钮
      openMainBtn.addEventListener("click", () => {
        invoke("toggle_main_window");
      });

      // 加载今日任务
      async function loadTodayTasks() {
        try {
          const today = new Date().toISOString().slice(0, 10);
          const tasks = await invoke("get_tasks_for_date", { date: today });

          if (tasks.length === 0) {
            taskList.innerHTML = '<div class="empty-state">🎉 今天没有任务</div>';
            return;
          }

          taskList.innerHTML = tasks.slice(0, 8).map(task => {
            const priorityClass = task.priority === 1 ? "priority-high" 
              : task.priority === 2 ? "priority-medium" : "priority-low";
            const timeStr = task.has_time_slot && task.time_start 
              ? task.time_start + (task.time_end ? `-${task.time_end}` : "") 
              : "";
            const dueStr = task.due_date === today ? "📌 今天截止" : "";

            return `
              <div class="task-item ${priorityClass}">
                <div class="task-title">${task.title}</div>
                <div class="task-time">${timeStr} ${dueStr}</div>
              </div>
            `;
          }).join("");

          if (tasks.length > 8) {
            taskList.innerHTML += `<div class="empty-state">+${tasks.length - 8} 更多...</div>`;
          }
        } catch (e) {
          taskList.innerHTML = '<div class="empty-state">加载失败</div>';
          console.error("加载今日任务失败:", e);
        }
      }

      // 初始加载
      loadTodayTasks();

      // 每60秒刷新一次
      setInterval(loadTodayTasks, 60000);
    </script>
  </body>
</html>
